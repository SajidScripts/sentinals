# ============================================
# Sentinals — Docker Compose
# Full-stack development environment
# ============================================

services:
  # ─── PostgreSQL ────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sentinals-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sentinals
      POSTGRES_PASSWORD: sentinals_secret
      POSTGRES_DB: sentinals_db
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5 --auth-local=md5"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinals -d sentinals_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sentinals-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── NestJS API ────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: sentinals-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sentinals:sentinals_secret@postgres:5432/sentinals_db?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-in-production}
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      API_PORT: 3001
      API_PREFIX: api
      NODE_ENV: production
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "3001:3001"

  # ─── Next.js Web ───────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: sentinals-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://api:3001/api
      NEXT_PUBLIC_APP_NAME: Sentinals
    ports:
      - "3000:3000"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
