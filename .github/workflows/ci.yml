name: Sentinals CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ─── Lint & Type Check ────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [api, web]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci
        working-directory: apps/${{ matrix.app }}

      - name: Generate Prisma Client (API only)
        if: matrix.app == 'api'
        run: npx prisma generate
        working-directory: apps/${{ matrix.app }}

      - run: npm run lint
        working-directory: apps/${{ matrix.app }}

  # ─── Tests ────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sentinals_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci
        working-directory: apps/api

      - name: Setup test database
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sentinals_test
        run: |
          npx prisma generate
          npx prisma migrate deploy
        working-directory: apps/api

      - name: Run API tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sentinals_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
        run: npm test
        working-directory: apps/api

  # ─── Build ────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, test]
    strategy:
      matrix:
        app: [api, web]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci
        working-directory: apps/${{ matrix.app }}

      - name: Generate Prisma Client (API only)
        if: matrix.app == 'api'
        run: npx prisma generate
        working-directory: apps/${{ matrix.app }}

      - run: npm run build
        working-directory: apps/${{ matrix.app }}

  # ─── Docker Build (main only) ─────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        app: [api, web]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sentinals-${{ matrix.app }}:${{ github.sha }} apps/${{ matrix.app }}
